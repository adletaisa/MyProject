{% extends 'base.html' %}

{% block content %}

<div class="card">

    <div class="title">➕ Новая привычка</div>

    <form method="post">
        {% csrf_token %}

        <input type="text" name="title" placeholder="Название" class="input">

        <textarea name="description" placeholder="Описание" class="input"></textarea>

        <select name="difficulty" class="input">
            <option value="easy">Легко</option>
            <option value="medium">Средне</option>
            <option value="hard">Сложно</option>
        </select>

        <input type="date" name="due_date" class="input">

        <label style="display:flex; gap:10px; align-items:center;">
            <input type="checkbox" name="completed">
            Выполнено
        </label>

        <button type="submit" class="btn btn-main">Сохранить</button>
    </form>

</div>

{% endblock %}
