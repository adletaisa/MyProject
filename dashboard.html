{% extends 'base.html' %}

{% block content %}

<div class="header">

    <div class="title">My Habits</div>

    <div>
        <a href="{% url 'add_habit' %}" class="btn btn-main">
            + Add Habit
        </a>

        <a href="{% url 'logout' %}" class="btn btn-gray">
            Logout
        </a>
    </div>

</div>

{% for habit in habits %}
<div class="card {% if habit.completed %}completed{% endif %}">

    <h3>{{ habit.title }}</h3>

    <div class="muted">
        📅 {{ habit.due_date }}
    </div>

    <p>{{ habit.description }}</p>

    <span class="badge {{ habit.difficulty }}">
        {{ habit.get_difficulty_display }}
    </span>

    <div class="actions">

        <a href="{% url 'toggle_habit' habit.id %}" class="btn btn-main">
            ✔ Done
        </a>

        <a href="{% url 'delete_habit' habit.id %}" class="btn btn-delete">
            ✖ Delete
        </a>

    </div>

</div>
{% endfor %}

{% endblock %}
